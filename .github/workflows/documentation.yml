name: Documentation
on:
  push:
    branches:
      - main
      - docs-patch # For docs deployment testing off main
    tags:
      - 'v*' # Triggers a new versioned archive when you push a git tag

permissions:
  contents: write

jobs:
  documentation:
    runs-on: ubuntu-latest
    steps: 
      - name: Checkout repository
        uses: actions/checkout@v4 # Updated to v4 for 2026 compatibility
        with:
          fetch-depth: 0      # Essential: mike needs full history to push to gh-pages

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Zensical requires 3.10+

      - name: Install environment
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev]"
          python -m pip install zensical mkdocstrings-python

      - name: Verify docs environment
        run: |
          python -m pip show zensical mkdocs
          python -c "import zensical, mkdocs; print('Docs deps OK')"

      - name: Build Documentation
        run: zensical build --strict

      - name: Prepare publish directory
        run: |
          rm -rf .publish
          mkdir -p .publish
          cp -R site/. .publish/

          # If this is a normal push to main, update the 'dev' and 'latest' aliases
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            mkdir -p .publish/dev .publish/latest
            cp -R site/. .publish/dev/
            cp -R site/. .publish/latest/
          fi
          
          # If this is a tag (e.g. v0.5.0), create a permanent versioned folder
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
            mkdir -p ".publish/$VERSION" .publish/latest
            cp -R site/. ".publish/$VERSION/"
            cp -R site/. .publish/latest/
          fi

      - name: Deploy Documentation
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .publish
          keep_files: true